<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dig systems — notes</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="mode-wrap">
    <button class="mode-btn" id="modeBtn">
      <span id="modeLabel">Floating Desktop</span>
      <svg width="9" height="6" viewBox="0 0 9 6"><path d="M1 1L4.5 4.5L8 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>
    </button>
    <div class="mode-dropdown" id="modeDropdown">
      <div class="mode-option active" data-mode="float">Floating Desktop</div>
      <div class="mode-option" data-mode="finder">Finder Desktop</div>
    </div>
  </div>

  <button class="auto-format-toggle" id="autoFmtBtn" title="Auto format grouping">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor">
      <rect x="0" y="0" width="5.5" height="5.5" rx="1" opacity=".6"/>
      <rect x="7.5" y="0" width="5.5" height="5.5" rx="1" opacity=".6"/>
      <rect x="0" y="7.5" width="5.5" height="5.5" rx="1" opacity=".35"/>
      <rect x="7.5" y="7.5" width="5.5" height="5.5" rx="1" opacity=".35"/>
    </svg>
    auto format
  </button>

  <div id="breadcrumb"></div>

  <button class="hbtn" id="newBtn" title="New note (Enter)">+</button>
  <button class="hbtn" id="settingsBtn" title="Settings">⚙</button>
  <button class="hbtn" id="closeBtn" title="Close" style="margin-left:2px;display:none">✕</button>
</div>

<!-- FLOAT VIEW -->
<div class="view active" id="float-view">
  <div class="float-canvas" id="floatCanvas"></div>
  <div class="shortcuts-panel">
    <div class="sc-title">Shortcuts</div>
    <div class="sc-row"><span>Notes:</span><span class="sc-key">Enter</span></div>
    <div class="sc-row"><span>View:</span><span class="sc-key">Tab</span></div>
    <div class="sc-row"><span>Archive:</span><span class="sc-key">Shift+A</span></div>
  </div>
</div>

<!-- FINDER VIEW -->
<div class="view" id="finder-view">
  <div class="finder-toolbar" id="finderToolbar">
    <span class="toolbar-spacer"></span>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="search by keyword"/>
      <div class="grid-btn"><div></div><div></div><div></div><div></div></div>
    </div>
  </div>
  <div class="finder-body" id="finderBody"></div>
</div>

<!-- NOTE EDITOR -->
<div class="overlay" id="overlay">
  <div class="editor-box">
    <div class="editor-top">
      <input class="e-title" id="eTitle" placeholder="Note title…"/>
      <span class="e-close" id="eClose">✕</span>
    </div>
    <textarea class="e-body" id="eBody" placeholder="Write anything…&#10;&#10;- bullet with -&#10;[ ] todo with [ ]"></textarea>
    <div class="e-meta">
      <label class="e-check-label"><input type="checkbox" id="eTodo" style="margin:0"/> todo?</label>
      <input class="e-tag" id="eTag1" placeholder="tag 1…"/>
      <input class="e-tag" id="eTag2" placeholder="tag 2…" style="width:90px"/>
    </div>
    <div class="e-footer">
      <select class="e-group" id="eGroup">
        <option value="">no group</option>
        <option value="studio">studio</option>
        <option value="cybernetics">cybernetics</option>
        <option value="capstone">capstone</option>
      </select>
      <button class="e-save" id="eSave">Save  ⌘↵</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── STATE ── */
const S = {
  mode: 'float',
  hideCompleted: false,
  filterGroup: 'all',
  suggestVisible: true,
  editingId: null,
  groups: ['studio','cybernetics','capstone'],
  notes: [
    { id:1, title:'Substrate tests — cork vs sphagnum', body:'Moisture retention data over 72hr periods', tags:['capstone','studio'], group:'studio', x:60, y:55, w:136, h:100, created:daysAgo(185), completed:false, archived:false, grouped:true },
    { id:2, title:'Moss cultivation log', body:'Week 3 — visible growth on N-facing sample', tags:['capstone'], group:'studio', x:220, y:40, w:118, h:92, created:daysAgo(180), completed:false, archived:false, grouped:true },
    { id:3, title:'Acoustic consultation notes', body:'Absorption 125–500hz. Cork performs well', tags:['studio'], group:'studio', x:128, y:188, w:140, h:98, created:daysAgo(60), completed:true, archived:false, grouped:true },
    { id:4, title:'Mycelium composite research', body:'Binding temps — arch faculty notes', tags:['capstone','urgent'], group:'cybernetics', x:400, y:70, w:128, h:98, created:daysAgo(90), completed:false, archived:false, grouped:true },
    { id:5, title:'TU Delft — motivation letter', body:'Building Technology / Climate Design', tags:['urgent','senior year'], group:'cybernetics', x:548, y:42, w:140, h:95, created:daysAgo(30), completed:false, archived:false, grouped:true },
    { id:6, title:'Water retention specs', body:'Passive capillary wicking — 72hr hold', tags:['capstone'], group:'studio', x:352, y:210, w:122, h:90, created:daysAgo(200), completed:false, archived:false, grouped:false },
    { id:7, title:'Pittsburgh air quality data', body:'PM2.5: Lawrenceville vs Mt Washington', tags:['capstone'], group:'studio', x:188, y:300, w:134, h:85, created:daysAgo(45), completed:false, archived:false, grouped:false },
    { id:8, title:'Structural consultation', body:'Load bearing — T-bar & chain-link mounting', tags:['capstone','studio'], group:'cybernetics', x:490, y:200, w:128, h:90, created:daysAgo(170), completed:false, archived:false, grouped:false },
  ]
};
let nextId = 20;

function daysAgo(d) { return Date.now() - d * 86400000; }
function ageText(ts) {
  const d = Math.floor((Date.now() - ts) / 86400000);
  if (d < 1) return 'today';
  if (d < 30) return d + 'd old';
  if (d < 60) return '1 mo old';
  return Math.floor(d/30) + ' mo old';
}
function isOld(ts) { return (Date.now() - ts) > 150 * 86400000; }

/* ── TOAST ── */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2000);
}

/* ─────────────────────────────── FLOAT VIEW ─── */
let drag = null, dragOff = {x:0,y:0};
let activeGroupMenu = null; // currently open group name

function closeGroupMenu() {
  activeGroupMenu = null;
  document.querySelectorAll('.group-menu-popup').forEach(el => el.remove());
}

function renderFloat() {
  const canvas = document.getElementById('floatCanvas');
  canvas.innerHTML = '';

  // Group backgrounds — draggable, with three-dot menu
  const byGroup = {};
  S.notes.filter(n => n.grouped && !n.archived).forEach(n => {
    (byGroup[n.group] = byGroup[n.group]||[]).push(n);
  });
  Object.entries(byGroup).forEach(([g, notes]) => {
    if (notes.length < 2) return;
    let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
    notes.forEach(n => {
      x0 = Math.min(x0, n.x-14); y0 = Math.min(y0, n.y-14);
      x1 = Math.max(x1, n.x+n.w+14); y1 = Math.max(y1, n.y+n.h+14);
    });
    const bg = div('group-bubble');
    bg.dataset.group = g;
    css(bg, { left:x0+'px', top:y0+'px', width:(x1-x0)+'px', height:(y1-y0)+'px', pointerEvents:'auto', cursor:'grab' });

    // label
    const lbl = div('group-bubble-label');
    lbl.textContent = g;
    bg.appendChild(lbl);

    // three-dot menu button (visible on hover)
    const menuBtn = div('group-menu-btn');
    menuBtn.innerHTML = '&#8942;'; // vertical ellipsis
    menuBtn.title = 'Group options';
    bg.appendChild(menuBtn);

    menuBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (activeGroupMenu === g) { closeGroupMenu(); return; }
      closeGroupMenu();
      activeGroupMenu = g;

      const popup = div('group-menu-popup');
      const rect = menuBtn.getBoundingClientRect();
      const canvasRect = canvas.getBoundingClientRect();
      css(popup, {
        left: (rect.left - canvasRect.left) + 'px',
        top:  (rect.bottom - canvasRect.top + 4) + 'px'
      });

      const groupNotes = S.notes.filter(n => n.group === g && !n.archived);
      const oldCount = groupNotes.filter(n => isOld(n.created)).length;

      popup.innerHTML = `
        <div class="gm-item" id="gm-archive">
          Archive group
          ${oldCount ? `<span class="gm-badge">${oldCount} old</span>` : ''}
        </div>
        <div class="gm-item" id="gm-ungroup">Ungroup</div>
      `;
      canvas.appendChild(popup);

      document.getElementById('gm-archive').onclick = e => {
        e.stopPropagation();
        groupNotes.forEach(n => { n.archived = true; });
        closeGroupMenu();
        renderFloat();
        toast(`"${g}" archived`);
      };
      document.getElementById('gm-ungroup').onclick = e => {
        e.stopPropagation();
        groupNotes.forEach(n => { n.grouped = false; });
        closeGroupMenu();
        renderFloat();
        toast(`"${g}" ungrouped`);
      };
    });

    // drag the whole group
    bg.addEventListener('mousedown', e => {
      if (e.target === menuBtn || e.target.closest('.group-menu-popup')) return;
      closeGroupMenu();
      const groupMembers = S.notes.filter(n => n.group === g && n.grouped && !n.archived);
      const startX = e.clientX, startY = e.clientY;
      const startPositions = groupMembers.map(n => ({ n, x: n.x, y: n.y }));
      bg.style.cursor = 'grabbing';
      e.preventDefault();
      e.stopPropagation();

      function onMove(ev) {
        const dx = ev.clientX - startX, dy = ev.clientY - startY;
        startPositions.forEach(({ n, x, y }) => { n.x = x + dx; n.y = y + dy; });
        renderFloat();
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    canvas.appendChild(bg);
  });

  // Suggestion ring for ungrouped notes
  const ungrouped = S.notes.filter(n => !n.grouped && !n.archived);
  if (S.suggestVisible && ungrouped.length >= 2) {
    const sample = ungrouped.slice(0,4);
    let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
    sample.forEach(n => {
      x0 = Math.min(x0, n.x-22); y0 = Math.min(y0, n.y-22);
      x1 = Math.max(x1, n.x+n.w+22); y1 = Math.max(y1, n.y+n.h+22);
    });
    const cx = (x0+x1)/2, cy = (y0+y1)/2;
    const r = Math.max(x1-x0, y1-y0)/2 + 18;
    const ring = div('suggest-ring');
    css(ring, { left:(cx-r)+'px', top:(cy-r)+'px', width:(r*2)+'px', height:(r*2)+'px' });
    canvas.appendChild(ring);
    const acts = div('ring-actions');
    css(acts, { left:(cx+r-22)+'px', top:(cy-r+4)+'px' });
    acts.innerHTML = `<div class="ring-act confirm" id="rAccept">✓</div><div class="ring-act dismiss" id="rIgnore">✕</div>`;
    canvas.appendChild(acts);
    document.getElementById('rAccept').onclick = () => {
      sample.forEach(n => { n.grouped = true; if(!n.group) n.group = 'studio'; });
      S.suggestVisible = false; renderFloat(); toast('Grouping accepted');
    };
    document.getElementById('rIgnore').onclick = () => {
      S.suggestVisible = false; renderFloat(); toast('Suggestion dismissed');
    };
  }

  // Tag tooltip on a tagged grouped note
  const tn = S.notes.find(n => n.grouped && !n.archived && n.tags && n.tags.length > 1);
  if (tn) {
    const tt = div('tag-tooltip');
    css(tt, { left:(tn.x + tn.w + 5)+'px', top:(tn.y + tn.h - 48)+'px' });
    tt.innerHTML = `<div class="tt-label">tag:</div>${tn.tags.map(t=>'<div>'+t+'</div>').join('')}`;
    canvas.appendChild(tt);
  }

  // Note cards — rendered on top of group bubbles
  S.notes.filter(n => !n.archived).forEach(n => {
    const card = div('note-card' + (n.grouped ? ' grouped' : ''));
    card.dataset.id = n.id;
    css(card, { left:n.x+'px', top:n.y+'px', width:n.w+'px', height:n.h+'px' });
    card.innerHTML = `
      <div class="note-inner">
        <div class="note-title">${n.title}</div>
        <div class="note-tags">${n.tags ? n.tags.map(t=>'#'+t).join(' ') : ''}</div>
        <div class="note-age">${ageText(n.created)}</div>
      </div>
      <div class="note-actions">
        <div class="nact edit-nact" title="Edit">✎</div>
      </div>
    `;
    card.querySelector('.edit-nact').addEventListener('click', e => { e.stopPropagation(); openEditor(n.id); });
    card.addEventListener('mousedown', onMouseDown);
    canvas.appendChild(card);
  });
}

function onMouseDown(e) {
  if (e.target.classList.contains('nact')) return;
  closeGroupMenu();
  const card = e.currentTarget;
  const id = +card.dataset.id;
  const note = S.notes.find(n => n.id === id);
  if (!note) return;
  drag = { note, card };
  dragOff = { x: e.clientX - note.x, y: e.clientY - note.y };
  card.classList.add('dragging');
  e.preventDefault();
  e.stopPropagation(); // prevent group bubble from also receiving this
}
document.addEventListener('mousemove', e => {
  if (!drag) return;
  drag.note.x = e.clientX - dragOff.x;
  drag.note.y = e.clientY - dragOff.y;
  drag.card.style.left = drag.note.x + 'px';
  drag.card.style.top  = drag.note.y + 'px';
});
document.addEventListener('mouseup', () => {
  if (drag) { drag.card.classList.remove('dragging'); drag = null; }
});

/* ─────────────────────────────── FINDER VIEW ─── */
function renderFinder() {
  const body = document.getElementById('finderBody');
  const search = document.getElementById('searchInput').value.toLowerCase();
  body.innerHTML = '';

  // Rebuild toolbar tabs
  const toolbar = document.getElementById('finderToolbar');
  toolbar.querySelectorAll('.ftab,.fdrop,.hide-btn,.toolbar-div').forEach(e => e.remove());
  const spacer = toolbar.querySelector('.toolbar-spacer');
  const tabs = ['all', ...S.groups];
  tabs.forEach(g => {
    const b = document.createElement('button');
    b.className = 'ftab' + (S.filterGroup === g ? ' active' : '');
    b.textContent = g;
    b.onclick = () => { S.filterGroup = g; setBreadcrumb(g); renderFinder(); };
    toolbar.insertBefore(b, spacer);
  });
  const sdrop = document.createElement('button'); sdrop.className = 'fdrop';
  sdrop.textContent = 'Date/time created ∨'; toolbar.insertBefore(sdrop, spacer);
  const pdrop = document.createElement('button'); pdrop.className = 'fdrop';
  pdrop.textContent = 'priority ∨'; toolbar.insertBefore(pdrop, spacer);
  const hbtn = document.createElement('button');
  hbtn.className = 'hide-btn' + (S.hideCompleted ? ' on' : '');
  hbtn.textContent = 'hide completed';
  hbtn.onclick = () => { S.hideCompleted = !S.hideCompleted; renderFinder(); };
  toolbar.insertBefore(hbtn, spacer);

  let filtered = S.notes.filter(n => !n.archived);
  if (S.filterGroup !== 'all') filtered = filtered.filter(n => n.group === S.filterGroup);
  if (search) filtered = filtered.filter(n =>
    n.title.toLowerCase().includes(search) || (n.body||'').toLowerCase().includes(search)
  );

  const wrapper = div('');
  if (S.hideCompleted) wrapper.classList.add('hide-completed-on');

  // Suggested row
  if (S.filterGroup === 'all' && !search) {
    const lbl = div('suggested-label'); lbl.textContent = 'suggested'; wrapper.appendChild(lbl);
    const row = div('suggested-row');
    [...S.notes].sort((a,b)=>b.created-a.created).slice(0,7).forEach(n => {
      const sc = div('sug-card');
      sc.textContent = n.title.length > 22 ? n.title.slice(0,22)+'…' : n.title;
      sc.onclick = () => openEditor(n.id);
      row.appendChild(sc);
    });
    wrapper.appendChild(row);
    const dv = div('finder-divider'); wrapper.appendChild(dv);
  }

  // Group sections
  const byGroup = {};
  filtered.forEach(n => { (byGroup[n.group||'ungrouped'] = byGroup[n.group||'ungrouped']||[]).push(n); });
  const groupsToShow = S.filterGroup === 'all' ? Object.keys(byGroup) : [S.filterGroup];
  groupsToShow.forEach(g => {
    const notes = byGroup[g] || [];
    const sec = div('group-section');
    const hdr = div('group-hdr'); hdr.textContent = g;
    hdr.onclick = () => { S.filterGroup = g; setBreadcrumb(g); renderFinder(); };
    sec.appendChild(hdr);
    const grid = div('note-grid');
    notes.forEach(n => {
      const card = div('finder-card' + (n.completed ? ' completed' : ''));
      card.innerHTML = `
        <div class="fc-age">${ageText(n.created)}</div>
        <div class="fc-title">${n.title}</div>
        <div class="fc-check">${n.completed ? '✓' : ''}</div>
      `;
      card.querySelector('.fc-check').addEventListener('click', e => {
        e.stopPropagation(); n.completed = !n.completed; renderFinder();
      });
      card.addEventListener('click', () => openEditor(n.id));
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    wrapper.appendChild(sec);
  });

  body.appendChild(wrapper);
}

function setBreadcrumb(g) {
  const el = document.getElementById('breadcrumb');
  if (g === 'all') { el.innerHTML = ''; return; }
  el.innerHTML = `<a onclick="S.filterGroup='all';setBreadcrumb('all');renderFinder()">home</a><span class="sep">›</span><span style="font-weight:500;color:var(--text)">${g}</span>`;
}

/* ─────────────────────────────── EDITOR ─── */
function openEditor(id) {
  S.editingId = id || null;
  const n = id ? S.notes.find(x => x.id === id) : null;
  document.getElementById('eTitle').value = n ? n.title : '';
  document.getElementById('eBody').value  = n ? n.body  : '';
  document.getElementById('eTag1').value  = n && n.tags ? (n.tags[0]||'') : '';
  document.getElementById('eTag2').value  = n && n.tags ? (n.tags[1]||'') : '';
  document.getElementById('eTodo').checked = n ? !!n.todo : false;
  document.getElementById('eGroup').value  = n ? (n.group||'') : '';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('eTitle').focus();
}

function saveNote() {
  const title = document.getElementById('eTitle').value.trim();
  if (!title) { toast('Add a title'); return; }
  const body  = document.getElementById('eBody').value;
  const tag1  = document.getElementById('eTag1').value.trim();
  const tag2  = document.getElementById('eTag2').value.trim();
  const tags  = [tag1,tag2].filter(Boolean);
  const todo  = document.getElementById('eTodo').checked;
  const group = document.getElementById('eGroup').value;

  if (S.editingId) {
    const n = S.notes.find(x => x.id === S.editingId);
    if (n) Object.assign(n, { title, body, tags, todo, group });
  } else {
    S.notes.push({ id:nextId++, title, body, tags, todo, group,
      x:60+Math.random()*300, y:60+Math.random()*200,
      w:130, h:95, created:Date.now(), completed:false, archived:false, grouped:false });
  }
  document.getElementById('overlay').classList.remove('open');
  S.editingId = null;
  if (S.mode==='float') renderFloat(); else renderFinder();
  toast('Saved');
}

/* ─────────────────────────────── MODE SWITCH ─── */
function switchMode(mode) {
  S.mode = mode;
  document.getElementById('modeLabel').textContent = mode==='float' ? 'Floating Desktop' : 'Finder Desktop';
  document.getElementById('modeDropdown').classList.remove('open');
  document.querySelectorAll('.mode-option').forEach(o => o.classList.toggle('active', o.dataset.mode===mode));
  document.getElementById('float-view').classList.toggle('active', mode==='float');
  document.getElementById('finder-view').classList.toggle('active', mode==='finder');
  document.getElementById('breadcrumb').innerHTML = '';
  S.filterGroup = 'all';
  if (mode==='float') renderFloat(); else renderFinder();
}

/* ─────────────────────────────── EVENTS ─── */
document.getElementById('modeBtn').onclick = () => {
  document.getElementById('modeDropdown').classList.toggle('open');
  document.getElementById('modeBtn').classList.toggle('open');
};
document.querySelectorAll('.mode-option').forEach(o => o.onclick = () => switchMode(o.dataset.mode));
document.getElementById('newBtn').onclick = () => openEditor(null);
document.getElementById('eSave').onclick = saveNote;
document.getElementById('eClose').onclick = () => document.getElementById('overlay').classList.remove('open');
document.getElementById('searchInput').addEventListener('input', renderFinder);
document.getElementById('autoFmtBtn').onclick = function() {
  this.classList.toggle('on');
  toast(this.classList.contains('on') ? 'Auto format on' : 'Auto format off');
};
document.getElementById('settingsBtn').onclick = () => toast('Settings coming soon');

document.addEventListener('click', e => {
  if (!e.target.closest('.mode-wrap')) {
    document.getElementById('modeDropdown').classList.remove('open');
    document.getElementById('modeBtn').classList.remove('open');
  }
  if (!e.target.closest('.group-menu-btn') && !e.target.closest('.group-menu-popup')) {
    closeGroupMenu();
  }
});

document.addEventListener('keydown', e => {
  if (document.getElementById('overlay').classList.contains('open')) {
    if (e.key === 'Escape') document.getElementById('overlay').classList.remove('open');
    if ((e.metaKey||e.ctrlKey) && e.key==='Enter') saveNote();
    return;
  }
  if (e.key==='Enter' && !e.metaKey && !e.ctrlKey) { e.preventDefault(); openEditor(null); }
  if (e.key==='Tab') { e.preventDefault(); switchMode(S.mode==='float' ? 'finder' : 'float'); }
  if (e.shiftKey && e.key==='A') {
    const old = S.notes.find(n => !n.archived && isOld(n.created));
    if (old) { old.archived=true; if(S.mode==='float') renderFloat(); toast('Archived: '+old.title.slice(0,28)); }
    else toast('No old notes to archive');
  }
});

/* ─────────────────────────────── UTILS ─── */
function div(cls) { const d = document.createElement('div'); if(cls) d.className=cls; return d; }
function css(el, styles) { Object.assign(el.style, styles); }

/* ─────────────────────────────── INIT ─── */
renderFloat();

// Electron integration — only runs inside the app, no-ops in browser
if (window.electronAPI) {
  const closeBtn = document.getElementById('closeBtn');
  closeBtn.style.display = 'flex';
  closeBtn.onclick = () => window.electronAPI.closeApp();
  // Make header draggable so window can be repositioned
  document.querySelector('.header').style.webkitAppRegion = 'drag';
  // But keep buttons clickable inside the drag region
  document.querySelectorAll('.header button, .header .mode-wrap, .header #breadcrumb')
    .forEach(el => el.style.webkitAppRegion = 'no-drag');
}
</script>
</body>
</html>
