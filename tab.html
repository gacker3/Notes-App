<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dig systems tab</title>
<link rel="stylesheet" href="tab.css">
</head>
<body>
<div class="tab" id="tab">
  <div class="tab-face" id="tabFace">
    <div class="tab-icon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="6" height="6" rx="1.2" fill="currentColor" opacity="0.9"/>
        <rect x="9" y="1" width="6" height="6" rx="1.2" fill="currentColor" opacity="0.7"/>
        <rect x="1" y="9" width="6" height="6" rx="1.2" fill="currentColor" opacity="0.5"/>
        <rect x="9" y="9" width="6" height="6" rx="1.2" fill="currentColor" opacity="0.35"/>
      </svg>
    </div>
    <div class="tab-label">dig<br>sys</div>
    <div class="tab-dot" id="tabDot"></div>
  </div>
</div>

<script>
  const tabFace = document.getElementById('tabFace');
  const tabDot  = document.getElementById('tabDot');
  let isOpen = false;

  tabFace.addEventListener('click', () => {
    window.electronAPI.toggleApp();
  });

  window.electronAPI.onAppState((open) => {
    isOpen = open;
    tabDot.classList.toggle('active', open);
    tabFace.classList.toggle('open', open);
  });
</script>
</body>
</html>
