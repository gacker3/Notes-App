<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dig systems  notes</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="mode-wrap">
    <button class="mode-btn" id="modeBtn">
      <span id="modeLabel">Floating Desktop</span>
      <svg width="9" height="6" viewBox="0 0 9 6"><path d="M1 1L4.5 4.5L8 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>
    </button>
    <div class="mode-dropdown" id="modeDropdown">
      <div class="mode-option active" data-mode="float">Floating Desktop</div>
      <div class="mode-option" data-mode="finder">Finder Desktop</div>
    </div>
  </div>

  <button class="auto-format-toggle" id="autoFmtBtn" title="Auto format grouping">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor">
      <rect x="0" y="0" width="5.5" height="5.5" rx="1" opacity=".6"/>
      <rect x="7.5" y="0" width="5.5" height="5.5" rx="1" opacity=".6"/>
      <rect x="0" y="7.5" width="5.5" height="5.5" rx="1" opacity=".35"/>
      <rect x="7.5" y="7.5" width="5.5" height="5.5" rx="1" opacity=".35"/>
    </svg>
    auto format
  </button>

  <div id="breadcrumb"></div>

  <button class="hbtn" id="newBtn" title="New note (Enter)">+</button>
  <button class="hbtn" id="settingsBtn" title="Settings">⚙</button>
</div>

<!-- FLOAT VIEW -->
<div class="view active" id="float-view">
  <div class="float-canvas" id="floatCanvas"></div>
  <div class="shortcuts-panel">
    <div class="sc-title">Shortcuts</div>
    <div class="sc-row"><span>Notes:</span><span class="sc-key">Enter</span></div>
    <div class="sc-row"><span>View:</span><span class="sc-key">Tab</span></div>
    <div class="sc-row"><span>Archive:</span><span class="sc-key">Shift+A</span></div>
    <div class="sc-row"><span>Undo:</span><span class="sc-key">⌘Z</span></div>
  </div>
</div>

<!-- FINDER VIEW -->
<div class="view" id="finder-view">
  <div class="finder-toolbar" id="finderToolbar">
    <span class="toolbar-spacer"></span>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="search by keyword"/>
      <div class="grid-btn"><div></div><div></div><div></div><div></div></div>
    </div>
  </div>
  <div class="finder-body" id="finderBody"></div>
</div>

<!-- NOTE VIEWER (read-only) -->
<div class="overlay" id="viewerOverlay">
  <div class="editor-box">
    <div class="editor-top">
      <div class="viewer-title" id="viewerTitle"></div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="viewer-edit-btn" id="viewerEditBtn" title="Edit"></span>
        <span class="e-close" id="viewerClose"></span>
      </div>
    </div>
    <div class="viewer-body" id="viewerBody"></div>
    <div class="viewer-meta" id="viewerMeta"></div>
  </div>
</div>

<!-- NOTE EDITOR -->
<div class="overlay" id="overlay">
  <div class="editor-box">
    <div class="editor-top">
      <input class="e-title" id="eTitle" placeholder="Note title"/>
      <span class="e-close" id="eClose"></span>
    </div>
    <!-- Plain body (shown when todo is unchecked) -->
    <textarea class="e-body" id="eBody" placeholder="Write anything&#10;&#10;Start a line with - for a bullet point"></textarea>
    <!-- Date fields -->
    <div class="e-dates" style="display:flex;flex-direction:column;gap:8px;">
      <input class="e-date" id="eDay" type="text" placeholder="Day" maxlength="2"/>
      <div style="display:flex;gap:8px;">
        <input class="e-date" id="eMonth" type="text" placeholder="Month" maxlength="2"/>
        <input class="e-date" id="eYear" type="text" placeholder="Year" maxlength="4"/>
      </div>
    </div>
    <!-- Todo item list (shown when todo is checked) -->
    <div class="todo-editor" id="todoEditor">
      <div class="todo-items" id="todoItems"></div>
      <button class="todo-add-btn" id="todoAddBtn">+ add item</button>
    </div>
    <div class="e-meta">
      <label class="e-check-label"><input type="checkbox" id="eTodo" style="margin:0"/> todo list</label>
    </div>
    <div class="e-footer">
      <select class="e-group" id="eGroup">
        <option value="">no group</option>
      </select>
      <button class="e-save" id="eSave">Save ↵</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
